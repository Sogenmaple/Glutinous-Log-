<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="pointerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <filter id="pointerGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 手指形状 -->
  <path d="M9 3l1 13 5-5 7 7 3-3-7-7 5-5z" 
        fill="url(#pointerGrad)" 
        stroke="#ff9500" 
        stroke-width="1.5"
        filter="url(#pointerGlow)"/>
  
  <!-- 点击效果圆圈 -->
  <circle cx="24" cy="8" r="4" fill="#ff9500" opacity="0.5">
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 高光 -->
  <path d="M10 5l0.8 10 4-4 6 6 2-2-6-6 4-4z" 
        fill="#e0f7fa" 
        opacity="0.5"/>
</svg>
